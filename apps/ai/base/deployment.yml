---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: visign-ai
  labels:
    app: visign-ai
    app.kubernetes.io/name: visign-ai
    app.kubernetes.io/instance: visign-ai
    app.kubernetes.io/component: ai
    app.kubernetes.io/part-of: visign
spec:
  replicas: 2
  selector:
    matchLabels:
      app: visign-ai
      app.kubernetes.io/name: visign-ai
      app.kubernetes.io/instance: visign-ai
      app.kubernetes.io/component: ai
      app.kubernetes.io/part-of: visign
  template:
    metadata:
      labels:
        app: visign-ai
        app.kubernetes.io/name: visign-ai
        app.kubernetes.io/instance: visign-ai
        app.kubernetes.io/component: ai
        app.kubernetes.io/part-of: visign
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: visign-ai
          image: visign-ai:latest
          ports:
            - containerPort: 8000
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "2Gi"
          readinessProbe:
            httpGet:
              path: /docs
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /docs
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 30
